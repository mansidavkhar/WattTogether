name: Simple Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Build
        run: npm run build --if-present
        working-directory: frontend
      - name: Test
        run: npm test
        working-directory: frontend

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm install
        working-directory: backend
      - name: Build
        run: npm run build --if-present
        working-directory: backend
      - name: Test
        run: npm test
        working-directory: backend
